name: Refresh FIFA data
on:
  schedule:
    # Every hour during World Cup window (Jun 11 - Jul 19, 2026)
    - cron: '17 * * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.commit.outputs.changed }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Fetch and build data
        run: python scripts/fetch_and_build.py

      - name: Commit if changed
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/schedule.json data/fifa_raw.json data/preview.json
          if git diff --cached --quiet; then
            echo "No data changes."
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            ts=$(date -u +"%Y-%m-%d %H:%M UTC")
            git commit -m "data: refresh schedule ($ts)"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

  # Deploy directly here — commits pushed by the GITHUB_TOKEN above won't
  # trigger deploy.yml on their own (GitHub safety against workflow loops).
  deploy:
    needs: refresh
    if: needs.refresh.outputs.changed == 'true'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      - id: deployment
        uses: actions/deploy-pages@v4
