name: Refresh FIFA data
on:
  schedule:
    # Every hour during World Cup window (Jun 11 - Jul 19, 2026)
    # Cron in UTC. Hourly = good balance of freshness vs FIFA API load.
    - cron: '17 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Fetch and build data
        run: python scripts/fetch_and_build.py

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/schedule.json data/fifa_raw.json
          if git diff --cached --quiet; then
            echo "No data changes."
          else
            ts=$(date -u +"%Y-%m-%d %H:%M UTC")
            git commit -m "data: refresh schedule ($ts)"
            git push
          fi
